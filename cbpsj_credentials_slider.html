<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Richard Marchetti — Credentials</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .slider-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #2C3E45; overflow: hidden; border-radius: 12px; }
  @media (max-width: 600px) { .slider-wrap { aspect-ratio: 3/4; } }
  .slides { display: flex; height: 100%; transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
  .slide { min-width: 100%; height: 100%; position: relative; flex-shrink: 0; background: #2C3E45; display: flex; align-items: center; justify-content: center; padding: 24px 24px 72px; }
  .slide img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.45); }
  .badge { position: absolute; bottom: 0; left: 0; right: 0; background: #16B6BA; padding: 12px 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .badge-text { color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; text-align: center; line-height: 1.3; }
  .badge-icon { flex-shrink: 0; width: 18px; height: 18px; opacity: 0.9; }
  .arrow { position: absolute; top: calc(50% - 36px); transform: translateY(-50%); background: rgba(44, 62, 69, 0.8); border: 2px solid rgba(22, 182, 186, 0.6); border-radius: 50%; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s; backdrop-filter: blur(4px); }
  .arrow:hover { background: #16B6BA; border-color: #16B6BA; }
  .arrow.prev { left: 10px; }
  .arrow.next { right: 10px; }
  .arrow svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .dots { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); display: flex; gap: 7px; z-index: 10; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.35); border: none; cursor: pointer; padding: 0; transition: background 0.25s, transform 0.25s; }
  .dot.active { background: #fff; transform: scale(1.3); }
  .thumbs { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .thumbs::-webkit-scrollbar { display: none; }
  .thumb { flex-shrink: 0; width: 68px; height: 50px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s; opacity: 0.55; background: #2C3E45; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.active { border-color: #16B6BA; opacity: 1; }
  .thumb:hover { opacity: 0.85; }
</style>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
