<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Richard Marchetti — Credentials</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }
  body { background: transparent; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; }
  .outer { width: 100%; max-width: 100%; overflow: hidden; padding-bottom: 12px; }
  .slider-wrap {
    position: relative;
    width: 100%;
    height: 420px;
    background: #2C3E45;
    border-radius: 12px;
    overflow: hidden;
  }
  @media (max-width: 600px) {
    .slider-wrap { height: 300px; }
  }
  .slides-track {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    width: 100%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .slide {
    flex: 0 0 100%;
    width: 100%;
    max-width: 100%;
    height: 100%;
    position: relative;
    background: #2C3E45;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 14px 56px;
    overflow: hidden;
  }
  .slide img {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: #16B6BA;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 0 12px;
    z-index: 5;
  }
  .badge-text {
    color: #fff;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge-icon { flex-shrink: 0; width: 16px; height: 16px; opacity: 0.9; }
  .arrow {
    position: absolute;
    top: calc(50% - 24px);
    transform: translateY(-50%);
    background: rgba(44,62,69,0.82);
    border: 2px solid rgba(22,182,186,0.55);
    border-radius: 50%;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(4px);
  }
  .arrow:hover { background: #16B6BA; border-color: #16B6BA; }
  .arrow.prev { left: 8px; }
  .arrow.next { right: 8px; }
  .arrow svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .dots {
    position: absolute;
    bottom: 54px;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.35); border: none; cursor: pointer; padding: 0; transition: background 0.25s, transform 0.25s; }
  .dot.active { background: #fff; transform: scale(1.4); }
  .thumbs {
    display: flex; gap: 5px;
    margin-top: 7px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .thumbs::-webkit-scrollbar { display: none; }
  .thumb {
    flex: 0 0 62px;
    height: 46px;
    border-radius: 5px; overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, opacity 0.2s;
    opacity: 0.55;
    background: #2C3E45;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.active { border-color: #16B6BA; opacity: 1; }
  .thumb:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="outer">
  <div class="slider-wrap" id="sliderWrap">
    <div class="slides-track" id="slidesTrack">
      <div class="slide">
        <img src="doc-images/advanced_CBP_certification.webp" alt="CBP Advanced Certification">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M5 20.5a7.5 7.5 0 0 1 14 0"/></svg><span class="badge-text">CBP® Advanced Certification</span></div>
      </div>
      <div class="slide">
        <img src="doc-images/basic_cbp_certification.webp" alt="CBP Distinguished Fellow">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M5 20.5a7.5 7.5 0 0 1 14 0"/></svg><span class="badge-text">CBP® Certification — Distinguished Fellow</span></div>
      </div>
      <div class="slide">
        <img src="doc-images/doctor_of_chiropractic_degree.webp" alt="Doctor of Chiropractic">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><span class="badge-text">Doctor of Chiropractic — Parker College</span></div>
      </div>
      <div class="slide">
        <img src="doc-images/National_Boards_Chiropractic.webp" alt="National Board Chiropractic">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg><span class="badge-text">National Board of Chiropractic Examiners</span></div>
      </div>
      <div class="slide">
        <img src="doc-images/NAtional_Boards_chiropractic_for_physiotherapy.webp" alt="National Board Physiotherapy">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg><span class="badge-text">National Board Certification — Physiotherapy</span></div>
      </div>
      <div class="slide">
        <img src="doc-images/new_hampshire_license.webp" alt="New Hampshire License">
        <div class="badge"><svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span class="badge-text">Licensed Chiropractor — State of New Hampshire</span></div>
      </div>
    </div>
    <button class="arrow prev" id="prev" aria-label="Previous"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="arrow next" id="next" aria-label="Next"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
    <div class="dots" id="dots"></div>
  </div>
  <div class="thumbs" id="thumbs"></div>
</div>
<script>
const COUNT = 6;
const SRCS = [
  "doc-images/advanced_CBP_certification.webp",
  "doc-images/basic_cbp_certification.webp",
  "doc-images/doctor_of_chiropractic_degree.webp",
  "doc-images/National_Boards_Chiropractic.webp",
  "doc-images/NAtional_Boards_chiropractic_for_physiotherapy.webp",
  "doc-images/new_hampshire_license.webp"
];
const LABELS = ["CBP Advanced","CBP Fellow","DC Degree","NBCE","NBCE Physio","NH License"];
const track = document.getElementById('slidesTrack');
const dotsEl = document.getElementById('dots');
const thumbsEl = document.getElementById('thumbs');
let current = 0, autoTimer;

for (let i = 0; i < COUNT; i++) {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
  const t = document.createElement('div');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  t.innerHTML = '<img src="' + SRCS[i] + '" alt="' + LABELS[i] + '" loading="lazy">';
  t.addEventListener('click', () => goTo(i));
  thumbsEl.appendChild(t);
}

function goTo(n) {
  current = (n + COUNT) % COUNT;
  track.style.transform = 'translateX(-' + (current * 100) + '%)';
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  thumbsEl.children[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  resetAuto();
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));
function startAuto() { autoTimer = setInterval(() => goTo(current + 1), 5000); }
function resetAuto() { clearInterval(autoTimer); startAuto(); }
startAuto();

let touchStartX = 0;
const wrap = document.getElementById('sliderWrap');
wrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
wrap.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
});
wrap.addEventListener('mouseenter', () => clearInterval(autoTimer));
wrap.addEventListener('mouseleave', startAuto);

function broadcastHeight() {
  window.parent.postMessage({ cbpsjCredHeight: document.body.scrollHeight }, '*');
}
window.addEventListener('load', broadcastHeight);
window.addEventListener('resize', broadcastHeight);
setTimeout(broadcastHeight, 500);
</script>
</body>
</html>
