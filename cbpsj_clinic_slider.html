<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBP Precision Spine Center — Clinic Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }
  body { background: transparent; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; }
  .outer { width: 100%; max-width: 100%; overflow: hidden; }

  /* === STYLE D: Main image left + thumbnail column right === */
  .gallery {
    display: flex;
    flex-direction: row;
    gap: 8px;
    width: 100%;
    height: 480px;
    background: #2C3E45;
    border-radius: 12px;
    overflow: hidden;
  }

  /* Main image pane */
  .main-pane {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    background: #1a2428;
  }
  .main-pane img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.35s ease;
  }
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(44,62,69,0.82);
    border: 2px solid rgba(22,182,186,0.55);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(4px);
  }
  .arrow:hover { background: #16B6BA; border-color: #16B6BA; }
  .arrow.prev { left: 10px; }
  .arrow.next { right: 10px; }
  .arrow svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .counter {
    position: absolute;
    bottom: 10px; right: 12px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.04em;
  }

  /* Thumbnail column */
  .thumb-col {
    flex: 0 0 110px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow-y: auto;
    padding: 6px 6px 6px 0;
    scrollbar-width: thin;
    scrollbar-color: #16B6BA #2C3E45;
  }
  .thumb-col::-webkit-scrollbar { width: 4px; }
  .thumb-col::-webkit-scrollbar-track { background: #2C3E45; }
  .thumb-col::-webkit-scrollbar-thumb { background: #16B6BA; border-radius: 2px; }
  .thumb {
    flex: 0 0 72px;
    width: 100%;
    height: 72px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, opacity 0.2s;
    opacity: 0.55;
    background: #1a2428;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.active { border-color: #16B6BA; opacity: 1; }
  .thumb:hover { opacity: 0.85; }

  /* Mobile: stack vertically */
  @media (max-width: 600px) {
    .gallery { flex-direction: column; height: auto; }
    .main-pane { height: 260px; flex: none; }
    .thumb-col {
      flex-direction: row;
      flex: none;
      height: 70px;
      overflow-y: hidden;
      overflow-x: auto;
      padding: 0 6px 6px 6px;
      scrollbar-width: none;
    }
    .thumb-col::-webkit-scrollbar { display: none; }
    .thumb { flex: 0 0 90px; height: 60px; }
  }
</style>
</head>
<body>
<div class="outer">
  <div class="gallery">
    <div class="main-pane" id="mainPane">
      <img id="mainImg" src="" alt="Clinic photo">
      <button class="arrow prev" id="prev" aria-label="Previous"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="arrow next" id="next" aria-label="Next"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
      <div class="counter" id="counter">1 / 16</div>
    </div>
    <div class="thumb-col" id="thumbCol"></div>
  </div>
</div>
<script>
const images = [
  "images/IMG-20250930-WA0006.webp",
  "images/IMG-20251001-WA0051.webp",
  "images/IMG-20251105-WA0036.webp",
  "images/IMG-20251105-WA0043.webp",
  "images/IMG-20251109-WA0071.webp",
  "images/IMG-20251109-WA0075.webp",
  "images/nutrition.webp",
  "images/WhatsApp_Image_2026-01-01_at_3_16_09_PM.webp",
  "images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__2_.webp",
  "images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__3_.webp",
  "images/WhatsApp_Image_2026-01-01_at_7_03_21_PM.webp",
  "images/WhatsApp_Image_2026-01-01_at_72.webp",
  "images/WhatsApp_Image_2026-01-01_at_74.webp",
  "images/WhatsApp_Image_2026-01-06.webp",
  "images/WhatsApp_Image_2026-06-02_at_5_15_18_PM.webp",
  "images/WhatsApp_Image1.webp"
];

const COUNT = images.length;
const mainImg = document.getElementById('mainImg');
const counter = document.getElementById('counter');
const thumbCol = document.getElementById('thumbCol');
let current = 0, autoTimer;

// Build thumbnails
images.forEach((src, i) => {
  const t = document.createElement('div');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = src;
  img.alt = 'Clinic photo ' + (i + 1);
  img.loading = 'lazy';
  t.appendChild(img);
  t.addEventListener('click', () => goTo(i));
  thumbCol.appendChild(t);
});

// Set initial main image
mainImg.src = images[0];

function goTo(n) {
  current = (n + COUNT) % COUNT;
  mainImg.style.opacity = '0';
  setTimeout(() => {
    mainImg.src = images[current];
    mainImg.style.opacity = '1';
  }, 180);
  counter.textContent = (current + 1) + ' / ' + COUNT;
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  // Scroll active thumb into view
  thumbCol.children[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  resetAuto();
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

function startAuto() { autoTimer = setInterval(() => goTo(current + 1), 5000); }
function resetAuto() { clearInterval(autoTimer); startAuto(); }
startAuto();

let touchStartX = 0;
document.getElementById('mainPane').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('mainPane').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
});
document.getElementById('mainPane').addEventListener('mouseenter', () => clearInterval(autoTimer));
document.getElementById('mainPane').addEventListener('mouseleave', startAuto);

function broadcastHeight() {
  window.parent.postMessage({ cbpsjClinicHeight: document.body.scrollHeight }, '*');
}
window.addEventListener('load', broadcastHeight);
window.addEventListener('resize', broadcastHeight);
setTimeout(broadcastHeight, 500);
</script>
</body>
</html>
