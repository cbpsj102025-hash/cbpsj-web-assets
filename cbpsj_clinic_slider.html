<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBP Precision Spine Center — Clinic Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .slider-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a2428; overflow: hidden; border-radius: 12px; }
  .slides { display: flex; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
  .slide { min-width: 100%; height: 100%; position: relative; flex-shrink: 0; background: #1a2428; }
  .slide img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
  .slide::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, rgba(0,0,0,0.35)); pointer-events: none; }
  .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(22, 182, 186, 0.85); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px); }
  .arrow:hover { background: #16B6BA; transform: translateY(-50%) scale(1.1); }
  .arrow.prev { left: 12px; }
  .arrow.next { right: 12px; }
  .arrow svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .dots { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 7px; z-index: 10; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.45); border: none; cursor: pointer; padding: 0; transition: background 0.25s, transform 0.25s; }
  .dot.active { background: #16B6BA; transform: scale(1.25); }
  .thumbs { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .thumbs::-webkit-scrollbar { display: none; }
  .thumb { flex-shrink: 0; width: 60px; height: 44px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s; opacity: 0.6; background: #1a2428; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.active { border-color: #16B6BA; opacity: 1; }
  .thumb:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="slider-wrap" id="sliderWrap">
  <div class="slides" id="slides">
    <div class="slide"><img src="images/IMG-20250930-WA0006.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/IMG-20251001-WA0051.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/IMG-20251105-WA0036.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/IMG-20251105-WA0043.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/IMG-20251109-WA0071.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/IMG-20251109-WA0075.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/nutrition.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__2_.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__3_.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_3_16_09_PM.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_7_03_21_PM.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_72.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-01-01_at_74.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image_2026-06-02_at_5_15_18_PM.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
    <div class="slide"><img src="images/WhatsApp_Image1.webp" alt="CBP Precision Spine Center" loading="lazy"></div>
  </div>
  <button class="arrow prev" id="prev" aria-label="Previous"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button class="arrow next" id="next" aria-label="Next"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
  <div class="dots" id="dots"></div>
</div>
<div class="thumbs" id="thumbs"></div>
<script>
const images=["images/IMG-20250930-WA0006.webp","images/IMG-20251001-WA0051.webp","images/IMG-20251105-WA0036.webp","images/IMG-20251105-WA0043.webp","images/IMG-20251109-WA0071.webp","images/IMG-20251109-WA0075.webp","images/nutrition.webp","images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__2_.webp","images/WhatsApp_Image_2026-01-01_at_3_16_09_PM__3_.webp","images/WhatsApp_Image_2026-01-01_at_3_16_09_PM.webp","images/WhatsApp_Image_2026-01-01_at_7_03_21_PM.webp","images/WhatsApp_Image_2026-01-01_at_72.webp","images/WhatsApp_Image_2026-01-01_at_74.webp","images/WhatsApp_Image_2026-06-02_at_5_15_18_PM.webp","images/WhatsApp_Image1.webp"];
const slidesEl=document.getElementById('slides'),dotsEl=document.getElementById('dots'),thumbsEl=document.getElementById('thumbs');
let current=0,autoTimer;
images.forEach((_,i)=>{const d=document.createElement('button');d.className='dot'+(i===0?' active':'');d.addEventListener('click',()=>goTo(i));dotsEl.appendChild(d);});
images.forEach((src,i)=>{const t=document.createElement('div');t.className='thumb'+(i===0?' active':'');t.innerHTML='<img src="'+src+'" alt="" loading="lazy">';t.addEventListener('click',()=>goTo(i));thumbsEl.appendChild(t);});
function goTo(n){current=(n+images.length)%images.length;slidesEl.style.transform='translateX(-'+(current*100)+'%)';document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===current));thumbsEl.children[current].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});resetAuto();}
document.getElementById('prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('next').addEventListener('click',()=>goTo(current+1));
function startAuto(){autoTimer=setInterval(()=>goTo(current+1),4000);}
function resetAuto(){clearInterval(autoTimer);startAuto();}
startAuto();
let touchStartX=0;
const wrap=document.getElementById('sliderWrap');
wrap.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
wrap.addEventListener('touchend',e=>{const diff=touchStartX-e.changedTouches[0].clientX;if(Math.abs(diff)>40)goTo(diff>0?current+1:current-1);});
wrap.addEventListener('mouseenter',()=>clearInterval(autoTimer));
wrap.addEventListener('mouseleave',startAuto);
function broadcastHeight(){window.parent.postMessage({cbpsjSliderHeight:document.body.scrollHeight},'*');}
window.addEventListener('load',broadcastHeight);
window.addEventListener('resize',broadcastHeight);
</script>
</body>
</html>
